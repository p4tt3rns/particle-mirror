<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>P4TT3RNS — PARTICLE MIRROR</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Satoshi', 'Arial', sans-serif;
      color: #fff;
      -webkit-font-smoothing: antialiased;
    }

    #main-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Hidden video for capture */
    #video {
      position: fixed;
      top: -9999px;
      left: -9999px;
      opacity: 0;
      pointer-events: none;
    }

    #pixel-canvas {
      position: fixed;
      top: -9999px;
      left: -9999px;
      width: 320px;
      height: 240px;
      pointer-events: none;
    }

    /* UI overlay */
    .ui-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* Top bar */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px;
      z-index: 20;
      pointer-events: none;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.78) 0%, rgba(0, 0, 0, 0) 100%);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.45);
      display: grid;
      place-items: center;
      background: rgba(0, 0, 0, 0.5);
    }

    .brand-mark svg {
      width: 18px;
      height: 18px;
    }

    .brand-text {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.85);
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.8);
    }

    .topbar-right {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.7);
      text-align: right;
      line-height: 1.8;
      font-family: 'Courier New', monospace;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.9);
    }

    .live-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #fff;
      margin-right: 6px;
      animation: blink 2s ease infinite;
      vertical-align: middle;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 0.9;
      }

      50% {
        opacity: 0.2;
      }
    }

    /* Bottom bar */
    .bottombar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 20px 28px 24px;
      z-index: 20;
      pointer-events: auto;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.82) 0%, rgba(0, 0, 0, 0) 100%);
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .ctrl-btn {
      pointer-events: auto;
      height: 38px;
      padding: 0 18px;
      border-radius: 100px;
      border: 1px solid rgba(255, 255, 255, 0.32);
      background: rgba(0, 0, 0, 0.6);
      color: rgba(255, 255, 255, 0.88);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: background 180ms, color 180ms, border-color 180ms;
      font-family: 'Satoshi', sans-serif;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
    }

    .ctrl-btn:hover {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.6);
      color: #fff;
    }

    .ctrl-btn.active {
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.75);
      color: #fff;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.18), 0 2px 16px rgba(0, 0, 0, 0.6);
    }

    .stats {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.55);
      text-align: right;
      line-height: 2;
      font-family: 'Courier New', monospace;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.9);
    }

    /* Sliders panel */
    .sliders {
      position: fixed;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 20px;
      z-index: 20;
      pointer-events: auto;
      background: rgba(0, 0, 0, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      padding: 18px 16px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.55);
    }

    .slider-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-end;
    }

    .slider-label {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.65);
      font-family: 'Courier New', monospace;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 90px;
      height: 1px;
      background: rgba(255, 255, 255, 0.18);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.6), 0 0 20px rgba(255, 255, 255, 0.2);
      cursor: pointer;
    }

    /* Permissions overlay */
    #perm-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 100;
    }

    #perm-overlay h1 {
      font-size: clamp(1.4rem, 4vw, 2.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      text-align: center;
      max-width: 16ch;
      line-height: 1.08;
    }

    #perm-overlay p {
      color: rgba(255, 255, 255, 0.45);
      font-size: 13px;
      letter-spacing: 0.05em;
      text-align: center;
      max-width: 36ch;
      line-height: 1.7;
    }

    #perm-btn {
      margin-top: 8px;
      height: 48px;
      padding: 0 32px;
      border-radius: 100px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'Satoshi', sans-serif;
      transition: background 180ms, border-color 180ms;
    }

    #perm-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.7);
    }

    #error-msg {
      color: rgba(255, 255, 255, 0.35);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-align: center;
      display: none;
      max-width: 36ch;
      line-height: 1.7;
    }

    /* Crosshair decoration */
    .crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      pointer-events: none;
      opacity: 0.08;
      z-index: 5;
    }

    .crosshair::before,
    .crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255, 255, 255, 0.8);
    }

    .crosshair::before {
      width: 1px;
      height: 100%;
      left: 50%;
      top: 0;
    }

    .crosshair::after {
      height: 1px;
      width: 100%;
      top: 50%;
      left: 0;
    }

    /* Hand logo overlay */
    #hand-logo {
      position: fixed;
      pointer-events: none;
      z-index: 6;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
      transform-origin: center center;
      will-change: transform, opacity;
      filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.3)) drop-shadow(0 0 4px rgba(255, 255, 255, 0.6));

      /* P4TT3RNS Custom Typography */
      width: 937px;
      height: 156px;
      font-family: 'Copperplate', 'Cinzel', serif;
      font-style: normal;
      font-weight: 400;
      font-size: 150px;
      line-height: 154px;
      text-align: center;
      color: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Mobile optimizations */
    @media (max-width: 768px) {
      .sliders {
        display: none !important;
      }

      .bottombar .controls [data-mode] {
        display: none !important;
      }

      .stats {
        display: none !important;
      }

      .topbar-right {
        display: none !important;
      }

      .bottombar {
        justify-content: center;
        padding: 16px 20px calc(env(safe-area-inset-bottom, 0px) + 24px);
      }

      .controls {
        gap: 0;
      }

      .ctrl-btn#btn-mute {
        margin-left: 0 !important;
        height: 44px;
        padding: 0 24px;
        font-size: 13px;
      }

      .topbar {
        padding: 14px 18px;
      }

      .brand-text {
        font-size: 9px;
        letter-spacing: 0.14em;
      }
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>

<body>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="pixel-canvas"></canvas>
  <canvas id="main-canvas"></canvas>

  <div id="perm-overlay">
    <h1>Particle Mirror</h1>
    <p>Your face becomes matter. Move, open and close your hand to disturb the field.</p>
    <button id="perm-btn">Activate camera</button>
    <p id="error-msg"></p>
  </div>

  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 770 194" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
          <g fill="none" stroke="currentColor" stroke-width="8">
            <path
              d="M54.6 36.6001C57.9 36.6001 60.7 35.9501 63 34.6501C65.4 33.3501 66.6 30.8001 66.6 27.0001C66.6 23.2001 65.4 20.6501 63 19.3501C60.7 18.0501 57.9 17.4001 54.6 17.4001H22.65V36.6001H54.6Z" />
            <path d="M143.849 18.9001L109.949 56.1001H143.849V18.9001Z" />
          </g>
        </svg>
      </div>
      <span class="brand-text">P4TT3RNS / LAB — Particle Mirror</span>
    </div>
    <div class="topbar-right" id="topbar-stats">
      <span class="live-dot"></span>LIVE<br>
      <span id="stat-particles">0</span> particles<br>
      <span id="stat-mode">ghost</span>
    </div>
  </div>

  <div class="crosshair"></div>

  <!-- P4TT3RNS hand logo -->
  <div id="hand-logo">P4TT3RNS</div>

  <div class="sliders">
    <div class="slider-row">
      <span class="slider-label">Density</span>
      <input id="s-density" type="range" min="1" max="100" value="100">
    </div>
    <div class="slider-row">
      <span class="slider-label">Scatter</span>
      <input id="s-scatter" type="range" min="0" max="100" value="0">
    </div>
    <div class="slider-row">
      <span class="slider-label">Threshold</span>
      <input id="s-thresh" type="range" min="0" max="100" value="30">
    </div>
  </div>

  <div class="bottombar">
    <div class="controls">
      <button class="ctrl-btn" id="btn-portrait" data-mode="portrait">Portrait</button>
      <button class="ctrl-btn active" id="btn-ghost" data-mode="ghost">Ghost</button>
      <button class="ctrl-btn" id="btn-chrome" data-mode="chrome">Chrome</button>
      <button class="ctrl-btn" id="btn-burst" data-mode="burst">Burst</button>
      <button class="ctrl-btn active" id="btn-mute" style="margin-left:12px;border-color:rgba(255,255,255,0.22)">♪
        On</button>
    </div>
    <div class="stats" id="hand-stats">
      hand x — <br>
      hand y — <br>
      field ∅
    </div>
  </div>

  <script>
    (function () {
      const video = document.getElementById('video');
      const pixelCanvas = document.getElementById('pixel-canvas');
      const mainCanvas = document.getElementById('main-canvas');
      const pixCtx = pixelCanvas.getContext('2d', { willReadFrequently: true });
      const ctx = mainCanvas.getContext('2d');
      const permOverlay = document.getElementById('perm-overlay');
      const permBtn = document.getElementById('perm-btn');
      const errorMsg = document.getElementById('error-msg');

      const W = () => mainCanvas.width;
      const H = () => mainCanvas.height;

      let mode = 'ghost';
      let density = 1.00, scatter = 0.00, repulse = 0.55, threshold = 0.30;
      let audioMuted = false;
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || (window.innerWidth <= 768 && 'ontouchstart' in window);

      const state = {
        running: false,
        handX: -1,
        handY: -1,
        handSX: 0.5,
        handSY: 0.5,
        handActive: false,
        handOpenness: 0,
        prevHandX: -1,
        prevHandY: -1,
        handVelX: 0,
        handVelY: 0,
        mouseX: -1,
        mouseY: -1,
        prevMouseX: -1,
        prevMouseY: -1,
        fingertips: [],  // array of {x, y} in normalized coords (0-1)
        frame: 0,
        particles: [],
        targetParticleCount: 0,
      };

      let hands = null;


      // ---- Particle system ----
      const screenArea = window.innerWidth * window.innerHeight;
      let MAX_P = isMobile
        ? Math.min(12000, Math.max(6000, Math.round(screenArea * 0.025)))
        : Math.min(120000, Math.max(100000, Math.round(screenArea * 0.04)));
      const particles = [];

      // Desktop uses dynamic high-res dimensions, Mobile uses yesterday's 160x120 stretched dimensions
      let SAMPLE_W = 160;
      let SAMPLE_H = 120;
      const TARGET_SAMPLE_AREA = 50000;

      function computeSampleDimensions() {
        const ar = (window.innerWidth || 390) / (window.innerHeight || 844);
        // Use a smaller sample area for mobile for performance, but keep correct aspect ratio
        const targetArea = isMobile ? 25000 : TARGET_SAMPLE_AREA;
        const sh = Math.round(Math.sqrt(targetArea / ar));
        const sw = Math.round(sh * ar);
        SAMPLE_W = Math.max(50, sw);
        SAMPLE_H = Math.max(50, sh);
      }
      computeSampleDimensions();

      // Recalculate on resize and orientation change
      function handleResize() {
        const area = window.innerWidth * window.innerHeight;
        MAX_P = isMobile
          ? Math.min(12000, Math.max(6000, Math.round(area * 0.025)))
          : Math.min(120000, Math.max(100000, Math.round(area * 0.04)));
        computeSampleDimensions();
        mainCanvas.width = window.innerWidth;
        mainCanvas.height = window.innerHeight;
      }
      window.addEventListener('resize', handleResize);
      window.addEventListener('orientationchange', () => {
        setTimeout(handleResize, 250); // delay for iOS orientation to settle
      });

      function Particle(x, y, brightness) {
        this.ox = x; this.oy = y;
        this.x = x;
        this.y = y;
        this.vx = 0; this.vy = 0;
        this.brightness = brightness;
        this.size = isMobile
          ? 0.3 + brightness * 0.5 + Math.random() * 0.2
          : 0.4 + brightness * 0.75 + Math.random() * 0.3;
        this.alpha = 0.5 + brightness * 0.5;
        this.chromatic = Math.random() < 0.03;
        this.noiseOff = Math.random() * 1000;
        this.life = 1;
        this.touch = 0;
        this.density = Math.random() * 40 + 5;
      }

      // Simple Perlin-ish noise (value noise)
      const noiseTable = new Float32Array(512);
      for (let i = 0; i < 512; i++) noiseTable[i] = Math.random() * 2 - 1;
      function noise(x, y, t) {
        const ix = Math.floor(x) & 255, iy = Math.floor(y) & 255, it = Math.floor(t) & 255;
        return noiseTable[(ix + iy * 57 + it * 131) & 511];
      }

      function sampleFrame() {
        pixCtx.save();
        pixCtx.scale(-1, 1); // mirror
        
        // Premium high-resolution cover cropping for all devices
        const videoW = video.videoWidth || 640;
        const videoH = video.videoHeight || 480;
        const screenAR = W() / H();
        const videoAR = videoW / videoH;
        let sx = 0, sy = 0, sw = videoW, sh = videoH;
        if (videoAR > screenAR) {
          sw = videoH * screenAR;
          sx = (videoW - sw) / 2;
        } else {
          sh = videoW / screenAR;
          sy = (videoH - sh) / 2;
        }
        pixCtx.drawImage(video, sx, sy, sw, sh, -SAMPLE_W, 0, SAMPLE_W, SAMPLE_H);
        
        pixCtx.restore();
        return pixCtx.getImageData(0, 0, SAMPLE_W, SAMPLE_H);
      }

      function rebuildParticles(imageData) {
        const data = imageData.data;
        const scaleX = W() / SAMPLE_W;
        const scaleY = H() / SAMPLE_H;
        const scatterPx = scatter * 14;
        const thresh = threshold * 200 + 20;
        const skip = Math.max(1, Math.round(2.5 - density * 1.8));

        particles.length = 0;

        for (let py = 0; py < SAMPLE_H; py += skip) {
          for (let px = 0; px < SAMPLE_W; px += skip) {
            const idx = (py * SAMPLE_W + px) * 4;
            const r = data[idx], g = data[idx + 1], b = data[idx + 2];
            const lum = 0.299 * r + 0.587 * g + 0.114 * b;
            if (lum < thresh) continue;
            const brightness = lum / 255;

            // Multiple particles per bright pixel based on brightness
            const count = mode === 'burst' ? 1 : (brightness > 0.7 ? 2 : 1);
            for (let c = 0; c < count; c++) {
              if (particles.length >= MAX_P) break;
              const p = new Particle(
                px * scaleX,
                py * scaleY,
                brightness
              );
              if (mode === 'ghost') {
                p.alpha *= 0.4;
                p.size *= 1.6;
              }
              if (mode === 'chrome') {
                p.chromatic = Math.random() < 0.18;
              }
              particles.push(p);
            }
          }
        }
        document.getElementById('stat-particles').textContent = particles.length.toLocaleString();
      }

      // ---- Rendering ----
      // Chrome gradient — precomputed
      function getChromeGradient(ctx, x, y, r) {
        const g = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, 0, x, y, r * 2.2);
        g.addColorStop(0, 'rgba(255,255,255,1)');
        g.addColorStop(0.25, 'rgba(210,210,210,0.95)');
        g.addColorStop(0.5, 'rgba(140,140,140,0.85)');
        g.addColorStop(0.75, 'rgba(40,40,40,0.7)');
        g.addColorStop(1, 'rgba(200,200,200,0.4)');
        return g;
      }

      let frameCount = 0;
      let lastRebuild = 0;
      const REBUILD_INTERVAL = isMobile ? 150 : 80; // ms between full particle rebuild from video

      function draw(ts) {
        if (!state.running) return;
        requestAnimationFrame(draw);

        if (typeof grainsThisFrame !== 'undefined') grainsThisFrame = 0;

        frameCount++;
        const t = ts * 0.001;

        // Resize if needed
        if (mainCanvas.width !== window.innerWidth || mainCanvas.height !== window.innerHeight) {
          mainCanvas.width = window.innerWidth;
          mainCanvas.height = window.innerHeight;
        }

        // Rebuild particles from video at intervals
        if (state.running && video.readyState >= 2 && (isMobile || video.videoWidth > 0) && ts - lastRebuild > REBUILD_INTERVAL) {
          pixelCanvas.width = SAMPLE_W;
          pixelCanvas.height = SAMPLE_H;
          const imageData = sampleFrame();
          rebuildParticles(imageData);
          lastRebuild = ts;
        }

        // Clear — softer fade for flowing particle trails
        if (mode === 'ghost') {
          ctx.fillStyle = 'rgba(0,0,0,0.35)';
        } else {
          ctx.fillStyle = 'rgba(0,0,0,0.68)';
        }
        ctx.fillRect(0, 0, W(), H());

        // Build array of repulsion points (fingertips or mouse fallback)
        const repulseR = 120;  // large radius for the whole hover effect
        const repPoints = [];

        if (state.handActive && state.fingertips.length > 0) {
          for (const ft of state.fingertips) {
            repPoints.push({ x: ft.x * W(), y: ft.y * H() });
          }
        } else if (state.mouseX >= 0) {
          repPoints.push({ x: state.mouseX, y: state.mouseY });
        }

        // Hand openness drives particle size inflation in range
        const handOpen = state.handOpenness;

        // Use center of fingertips for logo/circle position
        let ix = -999, iy = -999;
        if (repPoints.length > 0) {
          ix = 0; iy = 0;
          for (const rp of repPoints) { ix += rp.x; iy += rp.y; }
          ix /= repPoints.length;
          iy /= repPoints.length;
        }

        // Update + draw particles
        ctx.save();

        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];

          // exact hover effect from reference
          let isRepulsed = false;
          for (let rpi = 0; rpi < repPoints.length; rpi++) {
            const rp = repPoints[rpi];
            const dx = p.x - rp.x;
            const dy = p.y - rp.y;
            const distSquared = dx * dx + dy * dy;
            const radiusSquared = repulseR * repulseR;

            if (distSquared < radiusSquared) {
              const distance = Math.sqrt(distSquared) || 0.0001;
              const forceDirectionX = dx / distance;
              const forceDirectionY = dy / distance;
              const force = (repulseR - distance) / repulseR;
              
              p.x += forceDirectionX * force * p.density;
              p.y += forceDirectionY * force * p.density;
              
              p.touch = 1;
              isRepulsed = true;
              if (typeof triggerGrain === 'function') triggerGrain(p);
            }
          }

          if (!isRepulsed) {
             const backDx = p.ox - p.x;
             const backDy = p.oy - p.y;
             // Very slow return speed
             p.x += backDx * 0.02;
             p.y += backDy * 0.02;
          }

          // touch decay for trail effect
          p.touch *= 0.95;

          // Draw
          const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
          const speedBoost = Math.min(speed * 0.12, 0.5);

          // Inflate particle size based on hand openness + proximity
          // Uses smooth cubic easing to prevent trembling
          let sizeInflation = 1;
          if (state.handActive && handOpen > 0.05) {
            const dx = p.x - ix;
            const dy = p.y - iy;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const inflationR = repulseR * 2.5;
            if (dist < inflationR) {
              const proximity = 1 - dist / inflationR;
              // Smooth cubic ease-out curve instead of linear
              const smoothProx = proximity * proximity * (3 - 2 * proximity);
              sizeInflation = 1 + handOpen * smoothProx * (isMobile ? 0.6 : 1.5);
            }
          }

          if (p.chromatic && mode !== 'portrait') {
            // Chrome/metallic particle
            const r = p.size * (1 + speedBoost * 1.5 + p.touch * 0.8) * sizeInflation;
            ctx.beginPath();
            ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
            ctx.fillStyle = getChromeGradient(ctx, p.x, p.y, r);
            ctx.globalAlpha = p.alpha;
            ctx.fill();

            // Specular highlight
            ctx.beginPath();
            ctx.arc(p.x - r * 0.25, p.y - r * 0.25, r * 0.22, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.globalAlpha = 0.6;
            ctx.fill();
          } else if (p.chromatic) {
            // In portrait mode, chrome particles still have a subtle metallic look
            const r = p.size * (1.1 + p.touch * 0.7) * sizeInflation;
            const lum = Math.round(p.brightness * 255);
            ctx.beginPath();
            ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${lum},${lum},${lum},${p.alpha * 0.9})`;
            ctx.globalAlpha = 1;
            // thin ring
            ctx.strokeStyle = `rgba(255,255,255,0.55)`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
            ctx.fill();
          } else {
            // Standard monochrome particle
            const lum = Math.round(p.brightness * 255);
            const a = Math.min(1, p.alpha + speedBoost);
            const baseR = p.size * (1 + speedBoost * 0.5 + p.touch * 0.9) * sizeInflation;
            ctx.fillStyle = `rgba(${lum},${lum},${lum},${a})`;
            ctx.globalAlpha = 1;
            if (isMobile) {
              ctx.fillRect(p.x - baseR, p.y - baseR, baseR * 2, baseR * 2);
            } else {
              ctx.beginPath();
              ctx.arc(p.x, p.y, baseR, 0, Math.PI * 2);
              ctx.fill();
            }
          }
        }

        ctx.restore();

        // Draw hand cursor indicator
        if (state.handActive || state.mouseX >= 0) {
          const cx = ix, cy = iy;
          ctx.save();
          ctx.globalAlpha = 0.18;
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 0.8;
          ctx.beginPath();
          ctx.arc(cx, cy, 10, 0, Math.PI * 2);
          ctx.stroke();
          // inner dot
          ctx.globalAlpha = 0.5;
          ctx.beginPath();
          ctx.arc(cx, cy, 2.5, 0, Math.PI * 2);
          ctx.fillStyle = '#fff';
          ctx.fill();
          ctx.restore();
        }

        // Update P4TT3RNS hand logo position/scale
        const handLogo = document.getElementById('hand-logo');
        if (state.handActive && ix > -900) {
          // Larger logo as requested
          const logoScale = 120 / 937;
          const logoOpacity = 0.5 + handOpen * 0.5;
          handLogo.style.visibility = 'visible';
          handLogo.style.opacity = logoOpacity;
          handLogo.style.left = ix + 'px';
          handLogo.style.top = iy + 'px';
          handLogo.style.transform = `translate(-50%, -50%) scale(${logoScale})`;
        } else {
          handLogo.style.opacity = '0';
          handLogo.style.visibility = 'hidden';
        }

        // Mode-specific overlays
        if (mode === 'chrome') drawChromeRing(ctx, t);
        if (mode === 'burst') drawBurstHalo(ctx, ix, iy, t);

        // Update stats
        document.getElementById('hand-stats').innerHTML =
          `hand x ${state.handActive ? state.handX.toFixed(2) : '—'}<br>` +
          `hand y ${state.handActive ? state.handY.toFixed(2) : '—'}<br>` +
          `field ∅ ${Math.round(repulseR)}px`;
      }

      function drawChromeRing(ctx, t) {
        const cx = W() / 2, cy = H() / 2;
        const r = Math.min(W(), H()) * 0.38;
        ctx.save();
        ctx.globalAlpha = 0.06 + Math.sin(t * 0.7) * 0.02;
        const g = ctx.createConicalGradient ? null : null; // fallback
        ctx.strokeStyle = 'rgba(255,255,255,0.22)';
        ctx.lineWidth = 1;
        for (let i = 0; i < 3; i++) {
          ctx.beginPath();
          ctx.arc(cx, cy, r * (0.88 + i * 0.08) + Math.sin(t + i) * 6, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawBurstHalo(ctx, ix, iy, t) {
        if (ix < 0) return;
        ctx.save();
        for (let i = 0; i < 3; i++) {
          const r = 60 + i * 40 + Math.sin(t * 3 + i) * 12;
          ctx.beginPath();
          ctx.arc(ix, iy, r, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(255,255,255,${0.05 - i * 0.012})`;
          ctx.lineWidth = 0.8;
          ctx.globalAlpha = 1;
          ctx.stroke();
        }
        ctx.restore();
      }

      // ---- Mouse as hand fallback ----
      mainCanvas.addEventListener('mousemove', e => {
        state.mouseX = e.clientX;
        state.mouseY = e.clientY;
      });
      mainCanvas.addEventListener('mouseleave', () => {
        state.mouseX = -1;
        state.mouseY = -1;
      });

      // Touch
      mainCanvas.addEventListener('touchmove', e => {
        e.preventDefault();
        const t = e.touches[0];
        state.mouseX = t.clientX;
        state.mouseY = t.clientY;
      }, { passive: false });
      mainCanvas.addEventListener('touchend', () => {
        state.mouseX = -1;
        state.mouseY = -1;
      });

      // ---- Mode buttons ----
      document.querySelectorAll('[data-mode]').forEach(btn => {
        btn.addEventListener('click', () => {
          mode = btn.dataset.mode;
          document.getElementById('stat-mode').textContent = mode;
          document.querySelectorAll('[data-mode]').forEach(b => b.classList.toggle('active', b === btn));
          if (typeof switchModeSoundscape === 'function') switchModeSoundscape(mode);
        });
      });

      // ---- Sliders ----
      document.getElementById('s-density').addEventListener('input', e => { density = e.target.value / 100; });
      document.getElementById('s-scatter').addEventListener('input', e => { scatter = e.target.value / 100; });
      document.getElementById('s-thresh').addEventListener('input', e => { threshold = e.target.value / 100; });

      // ---- Camera init ----
      permBtn.addEventListener('click', startCamera);

      async function startCamera() {
        // Start camera request immediately to preserve the user gesture context on iOS!
        const cameraPromise = navigator.mediaDevices.getUserMedia({
          video: {
            width: { ideal: 640 },
            height: { ideal: 480 },
            facingMode: 'user'
          },
          audio: false
        });

        // iOS requires audio context started within user gesture
        if (typeof Tone !== 'undefined') {
          try {
            await Tone.start();
            if (Tone.context && Tone.context.state !== 'running') {
              await Tone.context.resume();
            }
          } catch (e) {
            console.error("Tone.start error:", e);
          }
        }
        // Initialize audio within user gesture context (critical for iOS)
        try {
          await initAudio();
        } catch (e) {
          console.error("initAudio error:", e);
        }

        permBtn.textContent = 'Initialising…';
        permBtn.disabled = true;
        try {
          const stream = await cameraPromise;
          video.srcObject = stream;
          video.onloadedmetadata = () => {
            video.play();
            mainCanvas.width = window.innerWidth;
            mainCanvas.height = window.innerHeight;
            state.running = true;
            permOverlay.style.transition = 'opacity 0.6s';
            permOverlay.style.opacity = '0';
            setTimeout(() => permOverlay.style.display = 'none', 650);

            // Init MediaPipe Hands
            hands = new Hands({
              locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });
            hands.setOptions({
              maxNumHands: 1,
              modelComplexity: 1,
              minDetectionConfidence: 0.6,
              minTrackingConfidence: 0.5
            });
            hands.onResults((results) => {
              const landmarks = results.multiHandLandmarks;
              if (landmarks && landmarks.length > 0) {
                const hand = landmarks[0];
                // Use index finger MCP (landmark 9) as main interaction center
                const p = hand[9];
                const targetX = 1 - p.x; // mirror horizontally
                const targetY = p.y;
                // light de-jitter, realtime response
                state.handX += (targetX - state.handX) * 0.35;
                state.handY += (targetY - state.handY) * 0.35;
                state.handActive = true;

                // Track all 5 fingertip positions for multi-point repulsion
                const tipIndices = [4, 8, 12, 16, 20];
                state.fingertips = tipIndices.map(ti => ({
                  x: 1 - hand[ti].x,  // mirror horizontally
                  y: hand[ti].y
                }));

                // Hand openness: avg distance from palm center (landmark 0) to fingertips (4,8,12,16,20)
                const palm = hand[0];
                const tips = [4, 8, 12, 16, 20];
                let avgDist = 0;
                for (const ti of tips) {
                  const dx = hand[ti].x - palm.x;
                  const dy = hand[ti].y - palm.y;
                  avgDist += Math.sqrt(dx * dx + dy * dy);
                }
                avgDist /= tips.length;
                // normalize: closed ~0.06, open ~0.22
                const openness = Math.max(0, Math.min(1, (avgDist - 0.06) / 0.16));
                // smooth repulse value
                repulse += (openness - repulse) * 0.12;
                // store openness for particle size inflation
                state.handOpenness += (openness - state.handOpenness) * 0.15;

                // Hand velocity for audio modulation
                if (state.prevHandX > -1) {
                  state.handVelX = state.handX - state.prevHandX;
                  state.handVelY = state.handY - state.prevHandY;
                }
                state.prevHandX = state.handX;
                state.prevHandY = state.handY;

                // Update audio engine
                updateAudio(state.handX, state.handY, openness,
                  Math.sqrt(state.handVelX * state.handVelX + state.handVelY * state.handVelY));
              } else {
                state.handActive = false;
                state.handOpenness *= 0.92;
                state.fingertips = [];
                fadeAudio();
              }
            });

            const processHands = async () => {
              if (!state.running || !hands) return;
              await hands.send({ image: video });
              requestAnimationFrame(processHands);
            };
            requestAnimationFrame(processHands);

            requestAnimationFrame(draw);
          };
        } catch (err) {
          errorMsg.style.display = 'block';
          if (err.name === 'NotAllowedError') {
            errorMsg.textContent = 'Camera access denied. Allow camera permissions and reload.';
          } else {
            errorMsg.textContent = 'Could not access camera: ' + err.message;
            // Fallback: run in demo mode with mouse only
            mainCanvas.width = window.innerWidth;
            mainCanvas.height = window.innerHeight;
            state.running = true;
            permOverlay.style.transition = 'opacity 0.8s';
            permOverlay.style.opacity = '0';
            setTimeout(() => permOverlay.style.display = 'none', 850);
            // Generate static particle field as demo
            generateDemoField();
            requestAnimationFrame(draw);
          }
          permBtn.textContent = 'Retry';
          permBtn.disabled = false;
        }
      }

      function generateDemoField() {
        // Create a face-shaped particle field for demo purposes
        particles.length = 0;
        const cx = W() / 2, cy = H() / 2;
        const rx = W() * 0.18, ry = H() * 0.28;
        for (let i = 0; i < 18000; i++) {
          const theta = Math.random() * Math.PI * 2;
          const rr = Math.random();
          // Face oval
          const px = cx + rx * (rr * Math.cos(theta)) * (0.7 + Math.random() * 0.6);
          const py = cy + ry * (rr * Math.sin(theta)) * (0.7 + Math.random() * 0.6);
          const dist = Math.sqrt(Math.pow((px - cx) / rx, 2) + Math.pow((py - cy) / ry, 2));
          const brightness = Math.max(0, 1 - dist * dist) * (0.4 + Math.random() * 0.6);
          if (brightness < 0.04) continue;
          const p = new Particle(px, py, brightness);
          if (Math.random() < 0.04) p.chromatic = true;
          particles.push(p);
        }
        document.getElementById('stat-particles').textContent = particles.length.toLocaleString();
      }

      // ---- Audio Engine (Tone.js) ----
      let audioStarted = false;
      let grainsThisFrame = 0;
      
      // Nodes
      let masterVol, masterFilter, masterComp, masterReverb, pannerX;
      let grainDelay, grainPanner;
      let droneOsc, droneFilter, droneLfo, droneVol;
      let currentModeNodes = [];
      let grainNoiseSynths = [];
      let grainTonalSynths = [];
      let grainIndex = 0;
      const MAX_GRAINS_PER_FRAME = 2;
      
      const pentatonicScale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99, 880.00, 1046.50];

      async function initAudio() {
        if (audioStarted) return;
        // Tone.start() already called in startCamera — avoid extra await to stay in gesture context
        
        // Start at audible level (not -Infinity) so iOS hears audio immediately
        masterVol = new Tone.Volume(-12).toDestination();
        masterFilter = new Tone.Filter(15000, "lowpass").connect(masterVol);
        masterComp = new Tone.Compressor({ threshold: -24, ratio: 6, knee: 12 }).connect(masterFilter);
        masterReverb = new Tone.Reverb({ decay: 4 }).connect(masterComp);
        masterReverb.wet.value = 0.4;
        // Don't await reverb.ready — keeps execution in user gesture context on iOS
        
        pannerX = new Tone.Panner(0).connect(masterReverb);
        
        grainDelay = new Tone.FeedbackDelay("8n", 0.4).connect(masterComp);
        grainPanner = new Tone.Panner(0).connect(grainDelay);

        // Breathing drone (Always on)
        droneVol = new Tone.Volume(-12).connect(pannerX);
        droneFilter = new Tone.Filter(200, "lowpass").connect(droneVol);
        droneOsc = new Tone.Oscillator(55, "sine").connect(droneFilter).start();
        droneLfo = new Tone.LFO(0.1, 100, 400).connect(droneFilter.frequency).start();

        // Setup grains
        for (let i = 0; i < 6; i++) {
          const nSynth = new Tone.NoiseSynth({
            noise: { type: 'pink' },
            envelope: { attack: 0.001, decay: 0.04, sustain: 0 }
          }).connect(grainPanner);
          nSynth.volume.value = -12;
          grainNoiseSynths.push(nSynth);

          const tSynth = new Tone.FMSynth({
            harmonicity: 2.1,
            modulationIndex: 12,
            oscillator: { type: "sine" },
            envelope: { attack: 0.1, decay: 1.5, sustain: 0.1, release: 2 },
            modulation: { type: "square" },
            modulationEnvelope: { attack: 0.5, decay: 0.1, sustain: 1, release: 0.5 }
          }).connect(grainPanner);
          tSynth.volume.value = -16;
          grainTonalSynths.push(tSynth);
        }

        audioStarted = true;
        switchModeSoundscape(mode);
        masterVol.volume.rampTo(-6, 1);
      }

      function switchModeSoundscape(newMode) {
        if (!audioStarted) return;
        currentModeNodes.forEach(node => {
          if (node.stop) node.stop();
          node.dispose();
        });
        currentModeNodes = [];
        
        if (newMode === 'portrait') {
          const chorus = new Tone.Chorus(4, 2.5, 0.5).connect(pannerX).start();
          const pad = new Tone.Synth({ oscillator: { type: "sawtooth" } }).connect(chorus);
          currentModeNodes.push(chorus, pad);
          if (droneOsc) {
            droneOsc.type = "sine";
            droneOsc.detune.value = 0;
          }
          masterReverb.decay = 4;
        } else if (newMode === 'ghost') {
          const delay = new Tone.FeedbackDelay("4n", 0.6).connect(pannerX);
          const tremolo = new Tone.Tremolo(4, 0.75).connect(delay).start();
          const eerieSub = new Tone.Oscillator(55, "pwm").connect(tremolo).start();
          eerieSub.volume.value = -15;
          currentModeNodes.push(delay, tremolo, eerieSub);
          if (droneOsc) {
            droneOsc.type = "sine";
            droneOsc.detune.value = 50; // Subtle dissonance
          }
          masterReverb.decay = 10;
        } else if (newMode === 'chrome') {
          const cheby = new Tone.Chebyshev(50).connect(pannerX);
          const fm = new Tone.FMOscillator("C2", "square", "square").connect(cheby).start();
          fm.volume.value = -15;
          currentModeNodes.push(cheby, fm);
          if (droneOsc) {
            droneOsc.type = "square";
            droneOsc.detune.value = 0;
          }
          masterReverb.decay = 3;
        } else if (newMode === 'burst') {
          const dist = new Tone.Distortion(0.8).connect(pannerX);
          const rumble = new Tone.Noise("brown").connect(dist).start();
          rumble.volume.value = -10;
          currentModeNodes.push(dist, rumble);
          if (droneOsc) {
            droneOsc.type = "sawtooth";
            droneOsc.detune.value = 0;
          }
          masterReverb.decay = 2;
        }
      }

      function updateAudio(handX, handY, openness, velocity) {
        if (!audioStarted || audioMuted) return;
        try {
          const safePan = Math.max(-1, Math.min(1, (handX * 2) - 1)) || 0;
          pannerX.pan.rampTo(safePan, 0.1);
          grainPanner.pan.rampTo(safePan, 0.1);
          
          const yInv = 1 - (handY || 0.5);
          const basePitch = 40 + yInv * 80;
          if (droneOsc) {
            droneOsc.frequency.rampTo(basePitch, 0.1);
          }

          masterFilter.frequency.rampTo(300 + (openness || 0) * 15000, 0.1);

          if (droneVol) {
            droneVol.volume.rampTo(-12 + (openness || 0) * 10, 0.1);
          }
          masterVol.volume.rampTo(-6, 0.1);
        } catch (e) {
          console.error("updateAudio error:", e);
        }
      }

      let lastGrainTime = 0;
      function triggerGrain(p) {
        if (!audioStarted || audioMuted) return;
        if (grainsThisFrame >= MAX_GRAINS_PER_FRAME) return;
        try {
          const now = Tone.now();
          if (now - lastGrainTime < 0.02) return; 
          
          let synth;
          if (mode === 'ghost') {
            synth = grainTonalSynths[grainIndex];
            const noiseSynth = grainNoiseSynths[grainIndex];
            grainIndex = (grainIndex + 1) % grainTonalSynths.length;
            
            const mysteriousScale = [130.81, 146.83, 164.81, 185.00, 207.65, 233.08, 261.63, 293.66, 329.63, 369.99, 415.30];
            let noteIdx = Math.floor((p.brightness || 0) * (mysteriousScale.length - 1));
            noteIdx = Math.max(0, Math.min(mysteriousScale.length - 1, noteIdx));
            const freq = mysteriousScale[noteIdx];
            
            const vel = Math.max(0, Math.min(1, (p.touch || 0) * 0.5 + 0.1));
            synth.triggerAttackRelease(freq, "2n", now, vel);
            noiseSynth.triggerAttackRelease("32n", now, vel * 0.4);
          } else {
            synth = grainNoiseSynths[grainIndex];
            grainIndex = (grainIndex + 1) % grainNoiseSynths.length;
            
            const vel = Math.max(0, Math.min(1, (p.touch || 0) * 0.5 + 0.1));
            synth.triggerAttackRelease("64n", now, vel);
          }
          
          grainsThisFrame++;
          lastGrainTime = now;
        } catch (e) {
          console.error("triggerGrain error:", e);
        }
      }

      function fadeAudio() {
        if (!audioStarted || !masterVol) return;
        masterVol.volume.rampTo(-18, 1.5); // Quiet ambient, not fully silent
      }

      // Mute button handler
      document.getElementById('btn-mute').addEventListener('click', function () {
        audioMuted = !audioMuted;
        this.textContent = audioMuted ? '♪ Off' : '♪ On';
        this.classList.toggle('active', !audioMuted);
        if (audioMuted && audioStarted && masterVol) {
          masterVol.volume.rampTo(-Infinity, 0.2);
        } else if (!audioMuted && audioStarted && masterVol) {
          masterVol.volume.rampTo(-6, 0.2);
        }
      });

      // Auto-start hint
      permBtn.focus();

      // iOS Audio Context activation fallback
      const resumeAudio = async () => {
        if (typeof Tone !== 'undefined' && Tone.context) {
          if (Tone.context.state !== 'running') {
            await Tone.start();
            await Tone.context.resume();
          }
        }
        document.body.removeEventListener('touchstart', resumeAudio);
        document.body.removeEventListener('click', resumeAudio);
      };
      document.body.addEventListener('touchstart', resumeAudio, { passive: true });
      document.body.addEventListener('click', resumeAudio, { passive: true });

    })();
  </script>
</body>
